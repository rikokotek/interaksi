<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subathon Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Orbitron:wght@700;900&family=Rajdhani:wght@700&family=Bebas+Neue&family=Roboto+Mono:wght@700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .overlay-container {
      text-align: center;
      padding: 20px 36px;
      border-radius: 16px;
      position: relative;
      width: 100%;
      transition: all 0.5s ease;
    }

    .overlay-title {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.7;
      margin-bottom: 8px;
      transition: all 0.5s;
    }

    .overlay-timer {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      transition: all 0.5s;
      font-variant-numeric: tabular-nums;
    }

    .overlay-status {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: 0.6;
      transition: all 0.5s;
    }

    /* Glow effect */
    .glow {
      text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
    }

    /* Pulse animation when paused */
    .paused .overlay-timer {
      animation: blink 1.5s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Time add animation */
    .time-added {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 900;
      color: #10b981;
      animation: float-up 2s ease forwards;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes float-up {
      from { transform: translateX(-50%) translateY(0); opacity: 1; }
      to { transform: translateX(-50%) translateY(-50px); opacity: 0; }
    }

    /* Tick animation */
    @keyframes tick {
      0% { transform: scale(1); }
      50% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="overlay-container" id="overlay" style="background: transparent;">
    <div class="overlay-title" id="overlay-title">Subathon</div>
    <div class="overlay-timer glow" id="overlay-timer">00:00:00</div>
    <div class="overlay-status" id="overlay-status"></div>
  </div>

  <script>
    const socket = io();
    let currentTime = 0;
    let isRunning = false;
    let lastTickTime = Date.now();

    const overlay = document.getElementById('overlay');
    const timerEl = document.getElementById('overlay-timer');
    const titleEl = document.getElementById('overlay-title');
    const statusEl = document.getElementById('overlay-status');

    function applyStyle(style) {
      if (!style) return;
      overlay.style.background = 'transparent';
      timerEl.style.color = style.textColor || '#a855f7';
      titleEl.style.color = style.textColor || '#a855f7';
      overlay.style.fontFamily = `'${style.fontFamily || 'Inter'}', sans-serif`;
      timerEl.style.fontFamily = `'${style.fontFamily || 'Inter'}', sans-serif`;
      titleEl.style.display = style.showTitle !== false ? 'block' : 'none';
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
    }

    function updateDisplay() {
      timerEl.textContent = formatTime(Math.max(0, currentTime));
      timerEl.style.animation = 'none';
      requestAnimationFrame(() => { timerEl.style.animation = ''; });
    }

    // Socket
    socket.on('subathon_update', (sub) => {
      currentTime = sub.timeSeconds || 0;
      isRunning = sub.enabled && !sub.paused;

      titleEl.textContent = sub.title || 'Subathon';
      applyStyle(sub.overlayStyle);

      if (isRunning) {
        overlay.classList.remove('paused');
        statusEl.textContent = '● Live';
        statusEl.style.color = '#10b981';
      } else if (sub.enabled && sub.paused) {
        overlay.classList.add('paused');
        statusEl.textContent = '⏸ Paused';
        statusEl.style.color = '#f59e0b';
      } else {
        overlay.classList.remove('paused');
        statusEl.textContent = '';
        statusEl.style.color = '#64748b';
      }

      updateDisplay();
    });

    socket.on('subathon_tick', ({ timeSeconds }) => {
      const added = timeSeconds - currentTime;
      if (added > 5) {
        showTimeAdded(added);
      }
      currentTime = timeSeconds;
      updateDisplay();
    });

    function showTimeAdded(seconds) {
      const el = document.createElement('div');
      el.className = 'time-added';
      el.textContent = `+${formatTimeDiff(seconds)}`;
      overlay.style.position = 'relative';
      overlay.appendChild(el);
      setTimeout(() => el.remove(), 2100);
    }

    function formatTimeDiff(s) {
      if (s < 60) return `${s}d`;
      if (s < 3600) return `${Math.floor(s/60)}m`;
      return `${Math.floor(s/3600)}j ${Math.floor((s%3600)/60)}m`;
    }

    // Fetch initial state
    fetch('/api/subathon')
      .then(r => r.json())
      .then(sub => {
        currentTime = sub.timeSeconds || 0;
        isRunning = sub.enabled && !sub.paused;
        titleEl.textContent = sub.title || 'Subathon';
        applyStyle(sub.overlayStyle);
        updateDisplay();

        if (isRunning) {
          statusEl.textContent = '● Live';
          statusEl.style.color = '#10b981';
        } else if (sub.enabled && sub.paused) {
          overlay.classList.add('paused');
          statusEl.textContent = '⏸ Paused';
          statusEl.style.color = '#f59e0b';
        } else {
          statusEl.textContent = '';
        }
      });
  </script>
</body>
</html>
