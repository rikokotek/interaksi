<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top Donate Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }
    .container {
      width: 280px;
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }
    .header {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .header-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #a855f7;
    }
    .list { display: flex; flex-direction: column; gap: 5px; }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      background: transparent;
      border: none;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .rank {
      font-size: 12px;
      min-width: 20px;
      text-align: center;
      font-weight: 900;
      color: rgba(255,255,255,0.35);
    }
    .rank.gold   { color: #f59e0b; }
    .rank.silver { color: #94a3b8; }
    .rank.bronze { color: #cd7c3a; }
    .name {
      flex: 1;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .amount {
      font-size: 13px;
      font-weight: 700;
      color: #a855f7;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .empty {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="header-title" id="overlay-title">Top Donate</span>
    </div>
    <div class="list" id="list">
      <div class="empty">Memuat...</div>
    </div>
  </div>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const rankClass = ['gold','silver','bronze'];

    let cfg = { title: 'Top Donate', defaultPeriod: 'all', overlayLimit: 5, showCount: false };
    let activePeriod = params.get('period') || null;
    let activeLimit  = parseInt(params.get('limit') || '0') || null;

    function formatRp(n) {
      if (n >= 1000000) return 'Rp' + (n/1000000).toFixed(1).replace('.0','') + 'jt';
      if (n >= 1000)    return 'Rp' + Math.round(n/1000) + 'rb';
      return 'Rp' + parseInt(n).toLocaleString('id');
    }

    function render(leaderboard) {
      const el = document.getElementById('list');
      if (!leaderboard || !leaderboard.length) {
        el.innerHTML = '<div class="empty">Belum ada donasi</div>';
        return;
      }
      el.innerHTML = leaderboard.map((d, i) => `
        <div class="item">
          <span class="rank ${rankClass[i] || 'other'}">${i+1}.</span>
          <span class="name">${d.name}</span>
          <span class="amount">${formatRp(d.totalAmount)}${cfg.showCount ? ` <span style="font-size:10px;opacity:0.5">(${d.count}x)</span>` : ''}</span>
        </div>
      `).join('');
    }

    function loadData() {
      const period = activePeriod || cfg.defaultPeriod || 'all';
      const limit  = activeLimit  || cfg.overlayLimit  || 5;
      fetch(`/api/top-donate?period=${period}&limit=${limit}`)
        .then(r => r.json())
        .then(data => render(data.leaderboard))
        .catch(() => {});
    }

    fetch('/api/top-donate-config')
      .then(r => r.json())
      .then(c => {
        cfg = c;
        document.getElementById('overlay-title').textContent = cfg.title || 'Top Donate';
        loadData();
      });

    setInterval(loadData, 30000);
  </script>
</body>
</html>
