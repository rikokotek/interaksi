<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Platform interaktif TikTok LIVE dashboard - kelola events, actions, screen overlay dan subathon secara real-time" />
  <title>TikFlow - TikTok Interactive Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.77 1.52V6.73a4.85 4.85 0 01-1-.04z" fill="url(#logo-grad)"/>
          <defs>
            <linearGradient id="logo-grad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a855f7"/>
              <stop offset="1" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">TikFlow</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="#connect" class="nav-item" data-page="connect" id="nav-connect">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
        <span>Connect</span>
        <div class="nav-status-dot" id="nav-live-dot"></div>
      </a>
      <a href="#actions" class="nav-item" data-page="actions" id="nav-actions">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>Actions</span>
      </a>
      <a href="#subathon" class="nav-item" data-page="subathon" id="nav-subathon">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Subathon</span>
      </a>
      <a href="#gifts" class="nav-item" data-page="gifts" id="nav-gifts">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M12 2L12 21"/><path d="M12 7L7 2 7 7"/><path d="M12 7L17 2 17 7"/>
        </svg>
        <span>TikTok Gifts</span>
      </a>
      <a href="#gallery" class="nav-item" data-page="gallery" id="nav-gallery">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>Gallery</span>
      </a>
        <a href="#analytics" class="nav-item" data-page="analytics" id="nav-analytics">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Analisa</span>
        </a>
      <a href="#donations" class="nav-item" data-page="donations" id="nav-donations">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span>Log Donasi</span>
      </a>
      <a href="#top-donate" class="nav-item" data-page="top-donate" id="nav-top-donate">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span>Top Donate</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="live-indicator" id="sidebar-live-badge">
        <div class="live-dot"></div>
        <span id="sidebar-status-text">Offline</span>
      </div>
      <div class="viewer-count" id="sidebar-viewers">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <span id="viewer-count-text">0</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-connect" class="page"></div>
    <div id="page-actions" class="page"></div>
    <div id="page-subathon" class="page"></div>
    <div id="page-gifts" class="page"></div>
    <div id="page-gallery" class="page"></div>
    <div id="page-donations" class="page"></div>
    <div id="page-top-donate" class="page"></div>
      <div id="page-analytics" class="page">
      <div class="fade-in">
        <div class="page-header">
          <div>
            <h1 class="page-title">Analisa Pendapatan</h1>
            <p class="page-subtitle">Statistik harian untuk performa live Anda</p>
          </div>
        </div>
        <div class="card" style="margin-top:20px; min-height: 400px; padding: 20px;">
          <canvas id="analyticsChart" width="400" height="300"></canvas>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/connect.js"></script>
  <script src="/js/actions.js"></script>
  <script src="/js/subathon.js"></script>
  <script src="/js/gifts.js"></script>
  <script src="/js/gallery.js"></script>
  <script src="/js/donations.js"></script>
  <script src="/js/top-donate.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
